services:
  postgres:
    image: postgres:16
    container_name: storage-helper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: storage_helper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: storage-helper-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
